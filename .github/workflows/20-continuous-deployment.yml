name: 20 - Continuous Deployment

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: your-dockerhub-user/qroud-web

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
      - name: Trigger Deployment
        run: echo "Deployment process to cluster triggered"
        # In a real scenario, this would SSH into a manager node and run:
        # docker stack deploy -c docker/docker-stack.yml qroud_stack
